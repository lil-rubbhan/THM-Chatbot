<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat With Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: rgba(255,255,255,0.07);
            --accent: #4fffb0;
            --accent-dim: rgba(79,255,176,0.12);
            --text: #f0f0f5;
            --muted: #6b6b80;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

            /* ── Animated background ── */
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse 60% 50% at 20% 10%, rgba(79,255,176,0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 80% 90%, rgba(100,80,255,0.08) 0%, transparent 60%);
                pointer-events: none;
                z-index: 0;
            }

            /* ── Grid texture ── */
            body::after {
                content: '';
                position: fixed;
                inset: 0;
                background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
                background-size: 48px 48px;
                pointer-events: none;
                z-index: 0;
            }

        /* ── Layout ── */
        .page {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 36px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            background: rgba(10,10,15,0.6);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: -0.02em;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.85);
            }
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.78rem;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid rgba(79,255,176,0.2);
            padding: 5px 13px;
            border-radius: 999px;
            letter-spacing: 0.04em;
            font-weight: 400;
        }

            .status-pill span {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--accent);
                animation: pulse 1.5s ease-in-out infinite;
            }

        /* ── Main ── */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding: 32px 20px;
            text-align: center;
        }

        .eyebrow {
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            opacity: 0;
            animation: fadeUp 0.6s 0.1s forwards;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3.4rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            max-width: 600px;
            opacity: 0;
            animation: fadeUp 0.6s 0.2s forwards;
        }

            h1 em {
                font-style: normal;
                color: var(--accent);
            }

        .sub {
            font-size: 1rem;
            color: var(--muted);
            max-width: 440px;
            line-height: 1.65;
            font-weight: 300;
            opacity: 0;
            animation: fadeUp 0.6s 0.35s forwards;
        }

        /* ── Chat launcher button ── */
        .chat-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: #050f0a;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 0 24px rgba(79,255,176,0.3);
            opacity: 0;
            animation: fadeUp 0.6s 0.5s forwards;
        }

            .chat-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 0 36px rgba(79,255,176,0.45);
            }

            .chat-btn svg {
                flex-shrink: 0;
            }

        /* ── Feature chips ── */
        .chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            animation: fadeUp 0.6s 0.65s forwards;
        }

        .chip {
            font-size: 0.78rem;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 999px;
            letter-spacing: 0.02em;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.72rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
            letter-spacing: 0.04em;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="page">

        <header>
            <div class="logo">
                <div class="logo-dot"></div>
                MyBot
            </div>
            <div class="status-pill"><span></span> Online &amp; Ready</div>
        </header>

        <main>
            <p class="eyebrow">Support · Sales · Enquiries</p>
            <h1>Talk to us.<br /><em>We're here.</em></h1>
            <p class="sub">Our chatbot is ready to help with any questions you have. Click below to start a conversation.</p>

            <button class="chat-btn" onclick="openChat()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                Start a Conversation
            </button>

            <div class="chips">
                <div class="chip">💬 Instant replies</div>
                <div class="chip">🕐 Available 24 / 7</div>
                <div class="chip">🔒 Secure &amp; private</div>
            </div>
        </main>

        <footer>Powered by respond.io &nbsp;·&nbsp; © 2026 MyBot</footer>

    </div>

        <script id="respondio__widget"
                src="https://cdn.respond.io/webchat/widget/widget.js?cId=3af1bec63ba941be5cbcd8a73594da9"
                defer>
        </script>
    <!-- https://respond.io -->

    <script>
        function openChat() {
    if (window.$respond) {
        window.$respond.do('chat:open');
        }
    }
    </script>

</body>
</html>
